<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>{% block title %}可乐 AI 工作台{% endblock %}</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: "Microsoft YaHei", "PingFang SC", -apple-system, sans-serif; background: #f5f5f5; color: #333; font-size: 13px; }
a { color: inherit; text-decoration: none; }

/* ===== 顶 nav ===== */
.topnav { background: #2c2c2c; color: #fff; padding: 0 20px; display: flex; align-items: center; height: 48px; box-shadow: 0 2px 4px rgba(0,0,0,.15); position: sticky; top: 0; z-index: 100; }
.topnav .brand { font-size: 16px; font-weight: bold; padding-right: 20px; border-right: 1px solid #444; }
.topnav .brand .ver { font-size: 11px; color: #888; margin-left: 6px; font-weight: normal; }
.topnav .navlinks { display: flex; flex: 1; margin-left: 10px; }
.topnav .navlinks a { padding: 0 16px; height: 48px; line-height: 48px; color: #ccc; font-size: 13px; }
.topnav .navlinks a:hover { background: #3a3a3a; color: #fff; }
.topnav .navlinks a.active { background: #4a90d9; color: #fff; }
.topnav .user { font-size: 12px; color: #aaa; padding-left: 16px; border-left: 1px solid #444; height: 48px; line-height: 48px; }
.topnav .user .login-btn { background: #4a90d9; color: #fff; padding: 4px 12px; border-radius: 3px; margin-left: 8px; font-size: 12px; }

/* ===== 容器 ===== */
.container { max-width: 1400px; margin: 0 auto; padding: 16px; }

/* ===== 卡片 / 段 ===== */
.card { background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 16px; margin-bottom: 12px; }
.section { background: #fff; border: 1px solid #ccc; border-radius: 4px; padding: 12px; margin-bottom: 12px; }
.section-title { font-size: 13px; font-weight: bold; margin-bottom: 10px; color: #333; padding-bottom: 6px; border-bottom: 1px solid #eee; }
.section-title .emoji { margin-right: 4px; }

/* ===== 表单 ===== */
.form-row { display: flex; align-items: center; margin-bottom: 8px; gap: 8px; }
.form-row label { min-width: 110px; color: #333; }
.form-row .hint { color: #888; font-size: 11px; }
input[type=text], input[type=password], input[type=number], select, textarea { padding: 4px 8px; border: 1px solid #bbb; border-radius: 3px; font-size: 13px; background: #fff; outline: none; }
input[type=text]:focus, input[type=password]:focus, input[type=number]:focus, select:focus, textarea:focus { border-color: #4a90d9; }
textarea { font-family: "Microsoft YaHei", sans-serif; resize: vertical; }
.btn { display: inline-block; padding: 5px 12px; background: #f0f0f0; border: 1px solid #bbb; border-radius: 3px; cursor: pointer; font-size: 12px; color: #333; user-select: none; }
.btn:hover { background: #e0e0e0; }
.btn-primary { background: #4a90d9; color: #fff; border-color: #3a7fc2; }
.btn-primary:hover { background: #3a7fc2; }
.btn-success { background: #4CAF50; color: #fff; border-color: #45a049; }
.btn-success:hover { background: #45a049; }
.btn-danger { background: #f44336; color: #fff; border-color: #da190b; }
.btn-danger:hover { background: #da190b; }
.btn-big { font-size: 14px; font-weight: bold; padding: 12px 20px; }
.btn-row { display: flex; gap: 8px; align-items: center; }

/* ===== 表格 ===== */
table { width: 100%; border-collapse: collapse; font-size: 12px; }
table th, table td { padding: 6px 8px; border: 1px solid #ddd; text-align: left; }
table th { background: #f0f0f0; font-weight: bold; }
table tr:hover td { background: #f8f8f8; }

/* ===== 文案卡片 ===== */
.script-card { border: 1px solid #ccc; border-radius: 4px; padding: 8px; margin-bottom: 8px; background: #fff; }
.script-card .head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px dashed #ddd; }
.script-card .head .idx { font-weight: bold; }
.script-card textarea { width: 100%; min-height: 60px; }

/* ===== 人设缩略图 ===== */
.persona-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
.persona-thumb { border: 2px solid #ddd; border-radius: 4px; padding: 8px; cursor: pointer; background: #fff; text-align: center; }
.persona-thumb.active { border-color: #4a90d9; background: #eaf3fc; }
.persona-thumb img { width: 100%; height: 100px; object-fit: cover; border-radius: 3px; background: #eee; }
.persona-thumb .name { font-weight: bold; margin-top: 4px; }

/* ===== 视频缩略图 grid ===== */
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
.product-card { border: 1px solid #ddd; border-radius: 4px; padding: 8px; background: #fff; }
.product-card video, .product-card .thumb-placeholder { width: 100%; height: 130px; object-fit: cover; background: #1e1e1e; border-radius: 3px; }
.product-card .name { font-size: 12px; margin-top: 4px; word-break: break-all; }

/* ===== 进度条 ===== */
.progress { width: 100%; height: 16px; background: #e0e0e0; border-radius: 8px; overflow: hidden; }
.progress-bar { height: 100%; background: linear-gradient(90deg, #4a90d9, #4CAF50); transition: width .3s; }

/* ===== 日志 ===== */
.log-box { background: #1e1e1e; color: #d4d4d4; font-family: "Menlo", "Consolas", monospace; font-size: 11px; padding: 8px; border-radius: 3px; height: 240px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }

/* ===== 主页卡片 ===== */
.home-hero { background: linear-gradient(135deg, #4a90d9, #6c5ce7); color: #fff; padding: 30px; border-radius: 6px; margin-bottom: 16px; }
.home-hero h1 { font-size: 22px; margin-bottom: 8px; }
.home-hero p { font-size: 13px; opacity: .9; }
.home-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
@media (max-width: 1100px) { .home-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 800px)  { .home-grid { grid-template-columns: repeat(2, 1fr); } }
.home-card { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 20px 14px; text-align: center; cursor: pointer; transition: all .2s; }
.home-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.08); border-color: #4a90d9; }
.home-card .icon { font-size: 36px; margin-bottom: 8px; }
.home-card .title { font-size: 14px; font-weight: bold; margin-bottom: 4px; }
.home-card .desc { font-size: 11px; color: #888; }

/* ===== 通用 ===== */
.row-flex { display: flex; gap: 12px; }
.col { flex: 1; min-width: 0; }
.muted { color: #888; font-size: 11px; }
.divider { height: 1px; background: #ddd; margin: 12px 0; }
.scroll-y { max-height: 300px; overflow-y: auto; border: 1px solid #ddd; border-radius: 3px; }
</style>
</head>
<body>
<div class="topnav">
  <div class="brand">🎬 可乐 AI 工作台 <span class="ver">v1.31</span></div>
  <div class="navlinks">
    <a href="/"        class="{% if active=='home'      %}active{% endif %}">主页</a>
    <a href="/task"    class="{% if active=='task'      %}active{% endif %}">📋 任务</a>
    <a href="/persona" class="{% if active=='persona'   %}active{% endif %}">👤 人设管理</a>
    <a href="/settings" class="{% if active=='settings'  %}active{% endif %}">⚙️ 设置</a>
    <a href="/product" class="{% if active=='product'   %}active{% endif %}">🎞 成品</a>
    <a href="/merge"   class="{% if active=='merge'     %}active{% endif %}">🎬 混剪/插段</a>
    <a href="/ai"      class="{% if active=='ai'        %}active{% endif %}">🤖 ai智能</a>
  </div>
  <div class="user">
    👤 <span id="nav-username">guest</span>
    <a href="/login" class="login-btn">登录/会员</a>
  </div>
</div>
<div class="container">
  {% block content %}{% endblock %}
</div>
</body>
</html>
